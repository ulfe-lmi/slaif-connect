<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SLAIF Connect</title>
    <style>
      body {
        box-sizing: border-box;
        min-width: 260px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        color: #202124;
        background: #fff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      p {
        margin: 0;
        color: #5f6368;
        line-height: 1.4;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        background: #f8fafd;
        color: #202124;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>SLAIF Connect</h1>
    <p>Sessions are launched from approved SLAIF pages.</p>
    <button id="start-dev" type="button">Open local dev session</button>
    <script type="module" src="../js/popup.js"></script>
  </body>
</html>
